<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOA Lobby Logs</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="settingsView" class="app-shell">
      <div class="settings-body">
        <section class="scan-card">
          <div>
            <strong>Scan</strong>
            <p id="status">Ready</p>
          </div>
          <button id="scanNow" class="primary scan-action">Scan Now</button>
        </section>

        <section class="settings-section configuration-section">
          <div class="section-title">Configuration</div>
          <div class="scan-grid">
            <label class="field">
              Server
              <select id="server">
                <option value="NA">NA</option>
                <option value="CE">CE</option>
              </select>
            </label>
            <label class="field">
              Hotkey
              <input id="scanHotkey" value="Ctrl+Alt+D" />
            </label>
            <label class="field">
              Overlay
              <select id="overlayPosition">
                <option value="left">Left</option>
                <option value="right">Right</option>
              </select>
            </label>
          </div>
        </section>

        <section class="settings-section calibration-section">
          <div class="section-title">Calibration</div>
          <div class="calibration-grid">
            <p id="calibrationStatus">Calibration not set</p>
            <div class="calibration-buttons">
              <button id="calibrateEncounterTitle">Calibrate Encounter</button>
              <button id="calibrateCharacterList">Calibrate Characters</button>
            </div>
          </div>
        </section>
      </div>

      <section class="settings-footer">
        <button id="openLogs" class="link-button">Open App Logs</button>
        <span id="settingsMessage"></span>
        <button id="saveSettings" class="primary">Save Settings</button>
      </section>
    </main>

    <main id="overlayView" class="overlay-shell" hidden>
      <header class="overlay-header">
        <div class="title-block">
          <h1>LOA Lobby Logs</h1>
          <p id="overlayStatus">No results yet</p>
        </div>
        <button id="dismissOverlay" class="icon-button" title="Dismiss">x</button>
      </header>
      <section id="overlaySummary" class="summary-strip overlay-summary">
        <div class="summary-main">
          <span>Encounter</span>
          <strong id="overlayEncounter">Unknown</strong>
        </div>
        <div class="summary-count">
          <span>Detected</span>
          <strong id="overlayDetected">0</strong>
        </div>
        <div class="summary-time">
          <span>Updated</span>
          <strong id="overlayUpdated">Never</strong>
        </div>
      </section>
      <section id="overlayProgress" class="overlay-progress" hidden>
        <strong id="overlayProgressTitle">Scanning...</strong>
        <p id="overlayProgressMessage"></p>
        <button id="openSettingsFromOverlay" class="primary" hidden>Open Settings</button>
      </section>
      <section id="overlayWarnings" class="warnings"></section>
      <section id="overlayResultsFrame" class="results-frame">
        <div id="overlayResultsHeader" class="results-header" aria-hidden="true">
          <span>Character</span>
          <span>Percentile</span>
          <span>Performance</span>
          <span>nDPS/rDPS</span>
        </div>
        <div id="overlayResults" class="results overlay-results"></div>
      </section>
      <section id="overlayLogPopover" class="log-popover" hidden></section>
    </main>

    <main id="calibrationView" class="calibration-shell" hidden>
      <div class="calibration-help">
        <strong id="calibrationTitle">Calibration</strong>
        <span>Drag a box. Press Escape to cancel.</span>
      </div>
      <div id="calibrationSelection" class="calibration-selection" hidden></div>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
