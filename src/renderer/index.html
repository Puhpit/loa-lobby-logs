<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOA Lobby Logs</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="settingsView" class="app-shell">
      <section class="toolbar">
        <div>
          <h1>LOA Lobby Logs</h1>
          <p id="status">Ready</p>
        </div>
        <button id="scanNow" class="primary">Scan Now</button>
      </section>

      <section class="controls settings-grid">
        <label>
          Server
          <select id="server">
            <option value="NA">NA</option>
            <option value="CE">CE</option>
          </select>
        </label>
        <label>
          Hotkey
          <input id="scanHotkey" value="Ctrl+Alt+D" />
        </label>
        <label>
          Capture
          <input id="captureMode" value="foreground-window-display" disabled />
        </label>
        <label>
          Overlay
          <select id="overlayPosition">
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </label>
      </section>

      <section class="controls stacked">
        <div class="screenshot-row">
          <button id="saveSettings">Save Settings</button>
          <button id="showLastResults">Show Last Results</button>
          <button id="openLogs">Open Logs</button>
          <span id="settingsMessage"></span>
        </div>
      </section>

      <section class="controls stacked">
        <div class="calibration-panel">
          <div>
            <strong>Calibration</strong>
            <p id="calibrationStatus">Drag one box around the encounter title and visible character rows.</p>
          </div>
          <div class="calibration-buttons">
            <button id="calibrateLobbyRegion">Calibrate Lobby Region</button>
          </div>
        </div>
      </section>

      <section class="controls stacked">
        <label>
          Manual test character names
          <textarea id="manualNames" spellcheck="false" placeholder="One name per line">Badseedrestart</textarea>
        </label>
        <div class="screenshot-row">
          <button id="chooseScreenshot">Choose Screenshot</button>
          <label class="toggle">
            <input id="useOcr" type="checkbox" />
            <span>OCR</span>
          </label>
          <span id="screenshotPath"></span>
        </div>
        <div class="controls compact">
          <label>
            Encounter
            <input id="encounter" value="[Normal]Dark Baratron" />
          </label>
          <label>
            Pages
            <input id="pages" type="number" min="1" max="10" value="3" />
          </label>
          <button id="reviewLobby" class="primary">Review Test Lobby</button>
        </div>
      </section>

      <section class="summary-strip">
        <div>
          <span>Encounter</span>
          <strong id="encounterSummary">Unknown</strong>
        </div>
        <div>
          <span>Detected</span>
          <strong id="candidateCount">0</strong>
        </div>
        <div>
          <span>Updated</span>
          <strong id="updatedAt">Never</strong>
        </div>
      </section>

      <section id="settingsResults" class="results"></section>
    </main>

    <main id="overlayView" class="overlay-shell" hidden>
      <header class="overlay-header">
        <div>
          <h1>LOA Lobby Logs</h1>
          <p id="overlayStatus">No results yet</p>
        </div>
        <button id="dismissOverlay" class="icon-button" title="Dismiss">x</button>
      </header>
      <section class="summary-strip overlay-summary">
        <div>
          <span>Encounter</span>
          <strong id="overlayEncounter">Unknown</strong>
        </div>
        <div>
          <span>Detected</span>
          <strong id="overlayDetected">0</strong>
        </div>
        <div>
          <span>Updated</span>
          <strong id="overlayUpdated">Never</strong>
        </div>
      </section>
      <section id="overlayWarnings" class="warnings"></section>
      <section id="overlayResults" class="results overlay-results"></section>
      <section id="overlayLogPopover" class="log-popover" hidden></section>
    </main>

    <main id="calibrationView" class="calibration-shell" hidden>
      <div class="calibration-help">
        <strong id="calibrationTitle">Calibration</strong>
        <span>Drag a box. Press Escape to cancel.</span>
      </div>
      <div id="calibrationSelection" class="calibration-selection" hidden></div>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
